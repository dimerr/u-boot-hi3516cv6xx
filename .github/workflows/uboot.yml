name: uboot
on:
  workflow_dispatch:

jobs:
  build:
    name: uboot
    runs-on: ubuntu-latest
    steps:
      - name: Prepare
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-linux-gnueabi u-boot-tools lzop gnutls-dev lzma-alone bison flex
          sudo ln -sf /bin/bash /bin/sh

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: python -m pip install pycryptodome
     
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Build HI3516CV6XX
        run: |
          cd $GITHUB_WORKSPACE
          bash build.sh

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          files: |
            output/*-nor.bin
            output/*-nand.bin
          fail_on_unmatched_files: false
